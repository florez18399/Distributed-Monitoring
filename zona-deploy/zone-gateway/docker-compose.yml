version: '3.8'

services:
  zone-gateway:
    image: nginx:alpine
    container_name: ${ZONE_ID}-api-gateway
    networks:
      - zone_net
      - main_net
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped

networks:
  zone_net:
    external: true
    name: ${ZONE_NETWORK_NAME}
  main_net:
    external: true
    name: main_gateway_net
