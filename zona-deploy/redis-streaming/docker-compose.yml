version: '3.8'

networks:
  zone_net:
    external: true
    name: ${ZONE_NETWORK_NAME}
  hdfs-net:
    external: true
    name: hdfs-backbone

services:
  redis-realtime:
    image: redis:7-alpine
    container_name: ${ZONE_ID}-redis
    hostname: redis-realtime
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    networks:
      - zone_net
      - hdfs-net
    ports:
      - "${REDIS_PORT_EXT}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
