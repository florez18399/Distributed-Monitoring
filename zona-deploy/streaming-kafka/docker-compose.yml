version: '3.8'

networks:
  zone_net:
    external: true
    name: ${ZONE_NETWORK_NAME}

services:
  broker:
    image: apache/kafka:latest
    hostname: broker 
    container_name: ${ZONE_ID}-broker
    networks:
      - zone_net
    ports:
      - "${KAFKA_PORT_EXT}:9092" 
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@broker:29093
      
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,CONTROLLER://broker:29093,PLAINTEXT_HOST://0.0.0.0:9092
      
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://${ZONE_ID}-broker:29092,PLAINTEXT_HOST://localhost:${KAFKA_PORT_EXT}
      
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      
      # Persistencia y Retención (Resiliencia + Control de espacio)
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_LOG_RETENTION_HOURS: 2
      KAFKA_LOG_RETENTION_CHECK_INTERVAL_MS: 300000
      KAFKA_LOG_SEGMENT_BYTES: 10485760
      KAFKA_LOG_RETENTION_BYTES: 524288000
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_DELETE_TOPIC_ENABLE: "true"
      
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - kafka_data:/var/lib/kafka/data

  kafka-consumer:
    image: apache/kafka:latest
    container_name: ${ZONE_ID}-consumer-test
    networks:
      - zone_net
    command: >
      bash -c "
      echo 'Waiting for Kafka to be ready...';
      until /opt/kafka/bin/kafka-topics.sh --bootstrap-server broker:29092 --list; do
        echo 'Kafka not ready, sleeping...';
        sleep 2;
      done;
      echo 'Kafka is ready! Starting consumer...';
      /opt/kafka/bin/kafka-console-consumer.sh --bootstrap-server broker:29092 --topic envoy-logs --from-beginning"
    depends_on:
      - broker

volumes:
  kafka_data:
    driver: local
