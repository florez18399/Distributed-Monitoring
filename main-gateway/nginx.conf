events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    server {
        listen 81;
        server_name localhost;

        location / {
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            return 200 "🚀 Main API Gateway Online";
            add_header Content-Type text/plain;
        }

        # Incluir configuraciones dinámicas de cada zona
        include /etc/nginx/conf.d/*.conf;

        # Configuración común de proxy
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;

        # Página de error por defecto (404) para zonas eliminadas
        error_page 404 /404.json;
        location = /404.json {
            return 404 '{"error": "Zone resource not found or zone is inactive"}';
            add_header Content-Type application/json;
        }
    }
}
